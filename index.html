<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>公开表格读取·智能评分工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --warning-bg: #fffbeb;
            --warning-border: #fde68a;
            --warning-text: #b45309;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
            --info-bg: #dbeafe;
            --info-text: #1e40af;
            --border: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #475569;
            --radius: 16px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05), 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        body {
            background: var(--bg);
            font-family: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
            padding: 2rem 1rem;
            min-height: 100vh;
            color: var(--text-main);
        }

        .container {
            max-width: 880px;
            margin: 0 auto;
        }

        /* 头部极简 */
        .simple-header {
            margin-bottom: 1.75rem;
            text-align: left;
        }
        .simple-header h1 {
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #1e293b, #2d3a4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }
        .simple-header .desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            border-left: 3px solid var(--primary);
            padding-left: 0.75rem;
            margin-top: 0.5rem;
        }

        /* 卡片样式 */
        .api-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 1.5rem;
        }

        .card-header {
            padding: 1rem 1.5rem;
            background: #fefefe;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 0.5rem;
        }
        .card-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .badge {
            background: #e0f2fe;
            color: #0369a1;
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* 警告框 */
        .alert {
            background: var(--warning-bg);
            border-left: 4px solid #f59e0b;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--warning-text);
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            color: var(--text-main);
        }
        .input-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.9rem;
            transition: 0.15s;
            background: white;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin: 1rem 0 1.25rem;
        }
        .btn {
            font-weight: 600;
            padding: 0.55rem 1.25rem;
            border-radius: 40px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
            border: 1px solid var(--border);
            color: var(--text-main);
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
        .btn-outline {
            border: 1px solid var(--border);
            background: white;
        }
        .btn-outline:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .result-box {
            padding: 0.9rem 1rem;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 500;
            margin: 1rem 0 0.75rem;
            display: none;
        }
        .result-box.show {
            display: block;
        }
        .result-success {
            background: var(--success-bg);
            color: var(--success-text);
            border-left: 4px solid #10b981;
        }
        .result-error {
            background: var(--error-bg);
            color: var(--error-text);
            border-left: 4px solid #ef4444;
        }
        .result-info {
            background: var(--info-bg);
            color: var(--info-text);
            border-left: 4px solid #3b82f6;
        }

        .preview-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            margin-top: 1rem;
            display: none;
            border-radius: 12px;
            overflow: hidden;
        }
        .preview-table.show {
            display: table;
        }
        .preview-table th,
        .preview-table td {
            border: 1px solid var(--border);
            padding: 0.6rem 0.5rem;
            text-align: center;
        }
        .preview-table th {
            background: #f8fafc;
            font-weight: 600;
            color: var(--text-main);
        }
        .preview-table td {
            color: var(--text-muted);
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .inline-code {
            background: #f1f5f9;
            padding: 0.1rem 0.3rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 极简头部，无冗余解说 -->
    <div class="simple-header">
        <h1>📡 公开表格智能读取</h1>
        <div class="desc">通过公开链接尝试提取评分数据 · 仅适用于已开启「获得链接可查看」的在线表格</div>
    </div>

    <!-- 只保留第三种方案：公开API读取 -->
    <div class="api-card">
        <div class="card-header">
            <h2>
                <span>🔗 公开链接API读取</span>
                <span class="badge">需权限设置</span>
            </h2>
        </div>
        <div class="card-body">
            <!-- 跨域提示精简但关键 -->
            <div class="alert">
                ⚠️ 因浏览器安全策略（CORS）及文档登录限制，此方式仅对<strong>完全公开且允许跨域</strong>的文档有效。<br>
                大多数WPS/腾讯文档无法直接通过前端API抓取。<strong>推荐先将数据手动复制到文本区？</strong> 但本工具仅演示“链接读取”能力，如失败属正常现象，您仍需使用手动导入等其他方法。
            </div>

            <div class="input-group">
                <label>📄 文档公开链接</label>
                <input type="url" id="docUrl" placeholder="https://docs.qq.com/sheet/... 或 https://www.kdocs.cn/l/...">
            </div>
            <div class="input-group">
                <label>🎯 目标列名 / 关键字</label>
                <input type="text" id="columnName" placeholder="例如：分数 / 评分 / 成绩 / 总分">
            </div>

            <div class="btn-row">
                <button class="btn btn-primary" id="fetchApiBtn">🌐 尝试读取并解析</button>
                <button class="btn btn-outline" id="sampleBtn">📌 填入示例链接</button>
            </div>

            <!-- 动态结果区 -->
            <div id="apiResult" class="result-box"></div>
            <table id="apiTable" class="preview-table">
                <thead>
                    <tr><th>序号</th><th>提取数值 (0-100)</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <div style="font-size:0.7rem; color:#6c757d; margin-top:12px; text-align:center;">
                💡 数值将自动筛选0-100区间的有效分数
            </div>
        </div>
    </div>

    <div class="footer-note">
        仅保留公开链接解析模块 · 纯前端演示跨域限制下的数据获取逻辑
    </div>
</div>

<script>
    // =======================
    // 纯工具函数（无任何无关功能）
    // =======================
    
    /**
     * 从文本中提取所有 0-100 之间的有效数值
     * @param {string} text 
     * @returns {number[]}
     */
    function extractNumbers(text) {
        if (!text || typeof text !== 'string') return [];
        const numbers = [];
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
            // 按常见分隔符分割：tab 逗号 分号 竖线 空格
            const parts = line.split(/[\t,;| ]+/);
            for (let part of parts) {
                // 提取数字（保留小数点）
                const cleaned = part.replace(/[^\d.-]/g, '').trim();
                if (cleaned) {
                    const num = parseFloat(cleaned);
                    if (!isNaN(num) && isFinite(num) && num >= 0 && num <= 100) {
                        numbers.push(num);
                    }
                }
            }
        }
        return numbers;
    }

    /**
     * 计算平均值
     * @param {number[]} arr 
     * @returns {number|null}
     */
    function calcAverage(arr) {
        if (!arr.length) return null;
        return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    /**
     * 显示结果消息
     * @param {string} elementId 
     * @param {number[]} numbers 
     * @param {number|null} avg 
     */
    function displayResult(elementId, numbers, avg) {
        const el = document.getElementById(elementId);
        if (!el) return;
        if (!numbers.length) {
            el.className = 'result-box show result-error';
            el.textContent = '❌ 未找到有效数值。请确认表格中包含 0~100 的分数列，或尝试使用更准确的列名。';
        } else {
            el.className = 'result-box show result-success';
            el.textContent = `✅ 成功提取 ${numbers.length} 个有效分数，平均分：${avg !== null ? avg.toFixed(2) : '--'}`;
        }
    }

    /**
     * 渲染表格数据
     * @param {string} tableId 
     * @param {number[]} numbers 
     */
    function renderTable(tableId, numbers) {
        const table = document.getElementById(tableId);
        if (!table) return;
        const tbody = table.querySelector('tbody');
        tbody.innerHTML = '';
        if (numbers && numbers.length) {
            table.classList.add('show');
            numbers.forEach((num, idx) => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = idx + 1;
                row.insertCell(1).textContent = num;
            });
        } else {
            table.classList.remove('show');
        }
    }

    /**
     * 深度遍历JSON对象查找包含列名关键字的数值
     * @param {any} obj 
     * @param {string} keyword 
     * @returns {number[]}
     */
    function extractFromJSON(obj, keyword) {
        const results = [];
        if (!obj || typeof obj !== 'object') return results;
        
        if (Array.isArray(obj)) {
            for (const item of obj) {
                results.push(...extractFromJSON(item, keyword));
            }
        } else {
            for (const key in obj) {
                // 检查键名或属性名是否包含关键字
                if (key.toLowerCase().includes(keyword.toLowerCase())) {
                    const val = obj[key];
                    if (typeof val === 'number' && val >= 0 && val <= 100) {
                        results.push(val);
                    } else if (typeof val === 'string') {
                        const num = parseFloat(val.replace(/[^\d.-]/g, ''));
                        if (!isNaN(num) && num >= 0 && num <= 100) results.push(num);
                    }
                }
                // 递归深入
                if (obj[key] && typeof obj[key] === 'object') {
                    results.push(...extractFromJSON(obj[key], keyword));
                }
            }
        }
        return results;
    }

    /**
     * 尝试从HTML文本中提取表格数据，基于关键字列
     * @param {string} htmlString 
     * @param {string} columnKeyword 
     * @returns {number[]}
     */
    function parseHtmlForNumbers(htmlString, columnKeyword) {
        const numbers = [];
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlString, 'text/html');
        
        // 1. 查找表格，尝试定位列
        const tables = doc.querySelectorAll('table');
        for (const table of tables) {
            // 优先基于 thead / th 寻找匹配列索引
            let targetColIndex = -1;
            const headers = table.querySelectorAll('th, thead td');
            if (headers.length) {
                for (let i = 0; i < headers.length; i++) {
                    const headerText = headers[i].textContent?.trim().toLowerCase() || '';
                    if (headerText.includes(columnKeyword.toLowerCase())) {
                        targetColIndex = i;
                        break;
                    }
                }
            }
            // 如果找到了目标列索引，提取该列数值
            if (targetColIndex !== -1) {
                const rows = table.querySelectorAll('tbody tr');
                for (const row of rows) {
                    const cells = row.querySelectorAll('td');
                    if (cells.length > targetColIndex) {
                        const cellText = cells[targetColIndex].textContent?.trim() || '';
                        const num = parseFloat(cellText.replace(/[^\d.-]/g, ''));
                        if (!isNaN(num) && num >= 0 && num <= 100) numbers.push(num);
                    }
                }
            } else {
                // 未找到表头，扫描全部单元格数值并降级匹配（但可能会有噪音）
                const allCells = table.querySelectorAll('td');
                for (const cell of allCells) {
                    const text = cell.textContent?.trim() || '';
                    const num = parseFloat(text.replace(/[^\d.-]/g, ''));
                    if (!isNaN(num) && num >= 0 && num <= 100) numbers.push(num);
                }
            }
        }
        
        // 2. 尝试从 script 标签内提取 JSON 内嵌数据 (如 WPS/腾讯文档渲染数据)
        const scripts = doc.querySelectorAll('script');
        for (let i = 0; i < scripts.length; i++) {
            const scriptContent = scripts[i].textContent || '';
            // 常见模式：window.__INITIAL_STATE__ 等
            let jsonMatch = scriptContent.match(/window\.__INITIAL_STATE__\s*=\s*({[\s\S]*?});/);
            if (!jsonMatch) {
                jsonMatch = scriptContent.match(/window\.__DATA__\s*=\s*({[\s\S]*?});/);
            }
            if (jsonMatch && jsonMatch[1]) {
                try {
                    const jsonData = JSON.parse(jsonMatch[1]);
                    const found = extractFromJSON(jsonData, columnKeyword);
                    numbers.push(...found);
                } catch (e) { /* 静默失败 */ }
            }
            // 也尝试全局查找任何类似数组的数值
            const allNumbers = scriptContent.match(/\d+\.?\d*/g);
            if (allNumbers && !numbers.length) {
                for (let n of allNumbers) {
                    const num = parseFloat(n);
                    if (!isNaN(num) && num >= 0 && num <= 100) numbers.push(num);
                }
            }
        }
        
        return numbers;
    }

    // 主要 fetch 逻辑
    async function fetchDocumentData(url, columnKeyword) {
        const resultDiv = document.getElementById('apiResult');
        const tableBody = document.querySelector('#apiTable tbody');
        
        // 重置状态
        resultDiv.className = 'result-box show result-info';
        resultDiv.textContent = '⏳ 正在请求文档数据，请稍候… (由于跨域限制，可能需要几秒)';
        if (tableBody) tableBody.innerHTML = '';
        document.getElementById('apiTable').classList.remove('show');
        
        if (!url) {
            resultDiv.className = 'result-box show result-error';
            resultDiv.textContent = '❌ 请填写文档公开链接';
            return;
        }
        if (!columnKeyword) {
            resultDiv.className = 'result-box show result-error';
            resultDiv.textContent = '❌ 请填写目标列名（如“分数”）';
            return;
        }
        
        try {
            // 尝试 fetch，注意 mode 默认 cors，但不能保证服务器支持。
            const response = await fetch(url, {
                method: 'GET',
                mode: 'cors',
                cache: 'no-cache',
                headers: {
                    'Accept': 'text/html,application/xhtml+xml,application/xml,text/csv;q=0.9,*/*;q=0.8'
                }
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: 无法获取文档，请确认链接公开且允许跨域访问`);
            }
            
            const contentType = response.headers.get('content-type') || '';
            let numbersExtracted = [];
            
            if (contentType.includes('text/csv') || url.includes('.csv') || url.includes('export')) {
                const csvText = await response.text();
                numbersExtracted = extractNumbers(csvText);
            } else {
                // 当作 HTML 解析
                const htmlText = await response.text();
                numbersExtracted = parseHtmlForNumbers(htmlText, columnKeyword);
                // 如果未找到，再尝试简单数字提取兜底
                if (numbersExtracted.length === 0) {
                    const fallbackNumbers = extractNumbers(htmlText);
                    numbersExtracted = fallbackNumbers;
                }
            }
            
            const avg = calcAverage(numbersExtracted);
            displayResult('apiResult', numbersExtracted, avg);
            renderTable('apiTable', numbersExtracted);
            
            if (numbersExtracted.length === 0) {
                const msgDiv = document.getElementById('apiResult');
                msgDiv.className = 'result-box show result-error';
                msgDiv.innerHTML = '⚠️ 未从文档中解析出任何分数。可能原因为：<br>1️⃣ 表格未公开或需登录<br>2️⃣ 列名关键字不匹配<br>3️⃣ 文档非标准HTML表格格式。<br>💡 <strong>建议改用复制粘贴方式</strong>，但本页面仅展示API方案，请知晓。';
            }
            
        } catch (err) {
            console.warn('Fetch error:', err);
            const errorDiv = document.getElementById('apiResult');
            errorDiv.className = 'result-box show result-error';
            errorDiv.innerHTML = `❌ 读取失败：${err.message || '网络或跨域错误'}<br>🔒 大多数在线文档由于CORS策略无法被前端直接读取。此页面仅演示「公开链接读取」方案，请理解技术局限。`;
            document.getElementById('apiTable').classList.remove('show');
        }
    }

    // UI 绑定与辅助
    function initPage() {
        const fetchBtn = document.getElementById('fetchApiBtn');
        const sampleBtn = document.getElementById('sampleBtn');
        const urlInput = document.getElementById('docUrl');
        const colInput = document.getElementById('columnName');

        if (fetchBtn) {
            fetchBtn.addEventListener('click', () => {
                const docUrl = urlInput.value.trim();
                const columnKw = colInput.value.trim();
                fetchDocumentData(docUrl, columnKw);
            });
        }
        
        if (sampleBtn) {
            sampleBtn.addEventListener('click', () => {
                // 仅用于演示占位，并不保证真实数据（用户可自行替换真实文档地址）
                urlInput.value = 'https://docs.qq.com/sheet/DUmFpVWlJc2RkS2xk?tab=BB08J2';
                colInput.value = '评分';
                // 顺便展示提示：示例仅为占位，实际由于跨域无法成功
                const tmpDiv = document.getElementById('apiResult');
                tmpDiv.className = 'result-box show result-info';
                tmpDiv.innerHTML = '🧪 示例链接已填入，但腾讯公开文档通常禁止前端跨域抓取，仅为演示填写格式。<br>您可尝试填入自己已设置“公开可查看”且支持跨域的文档链接。';
                document.getElementById('apiTable').classList.remove('show');
            });
        }
        
        // 额外提供空白清空/聚焦友好
    }
    
    // 页面完全加载后初始化
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPage);
    } else {
        initPage();
    }
</script>
</body>
</html>
