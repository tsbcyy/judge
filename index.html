<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>专业评委评分系统 | 加权总分 | 评委60% + 收集表40%</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px 16px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 1.9rem;
            background: linear-gradient(120deg, #fbbf24, #ffedd5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0 0 6px 0;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.85rem;
            border-top: 1px solid #334155;
            display: inline-block;
            padding-top: 6px;
        }

        .contestants-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .contestant-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 1.5rem;
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            border: 1px solid rgba(251, 191, 36, 0.3);
            transition: all 0.2s;
        }

        .contestant-header {
            background: #1e293b;
            padding: 0.7rem 1.2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #fbbf24;
        }

        .contestant-name-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .contestant-name {
            font-size: 1.2rem;
            font-weight: 700;
            background: #fbbf24;
            padding: 2px 14px;
            border-radius: 32px;
            color: #0f172a;
        }

        .contestant-badge {
            background: #334155;
            padding: 2px 10px;
            border-radius: 24px;
            color: #facc15;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .contestant-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: #475569;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 28px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.7rem;
        }

        .btn-icon.danger {
            background: #991b1b;
        }

        .btn-icon.danger:hover {
            background: #7f1d1d;
        }

        .btn-icon:hover {
            background: #fbbf24;
            color: #0f172a;
        }

        .judges-section {
            padding: 1rem 1.2rem 1.2rem;
            background: #f8fafc;
        }

        .section-toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
            gap: 8px;
        }

        .judges-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #0f172a;
            border-left: 4px solid #fbbf24;
            padding-left: 10px;
        }

        .button-group {
            display: flex;
            gap: 6px;
        }

        .small-btn {
            background: #e2e8f0;
            border: none;
            padding: 4px 12px;
            border-radius: 28px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .small-btn.primary {
            background: #fbbf24;
            color: #0f172a;
        }

        .small-btn.primary:hover {
            background: #eab308;
        }

        .judges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .judge-card {
            background: white;
            border-radius: 1rem;
            padding: 8px 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .judge-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .judge-name {
            font-weight: 700;
            font-size: 0.75rem;
            background: #f1f5f9;
            padding: 2px 8px;
            border-radius: 20px;
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .remove-judge {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: bold;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .remove-judge:hover {
            background: #fee2e2;
            border-radius: 30px;
        }

        .score-input-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            margin: 6px 0 4px;
        }

        .score-input-wrapper label {
            font-size: 0.65rem;
            font-weight: 600;
            color: #334155;
        }

        .score-input {
            flex: 1;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            padding: 4px 6px;
            text-align: center;
            font-weight: 500;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .score-input:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2);
        }

        .score-input.invalid {
            border-color: #ef4444;
            background: #fef2f2;
        }

        .score-preview {
            font-size: 0.6rem;
            text-align: right;
            color: #2c7da0;
        }

        /* 收集表数据区域样式 */
        .data-collect-section {
            background: #f1f5f9;
            margin: 0 1.2rem 0.8rem 1.2rem;
            padding: 10px 16px;
            border-radius: 32px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px dashed #cbd5e1;
        }
        .collect-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #0f172a;
            background: #e2e8f0;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .collect-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .collect-input {
            border: 2px solid #cbd5e1;
            border-radius: 32px;
            padding: 6px 12px;
            width: 110px;
            text-align: center;
            font-weight: 600;
            font-family: monospace;
            font-size: 0.85rem;
            background: white;
        }
        .collect-input:focus {
            outline: none;
            border-color: #fbbf24;
        }
        .weight-hint {
            font-size: 0.65rem;
            color: #475569;
            background: #eef2ff;
            border-radius: 20px;
            padding: 2px 10px;
        }

        .contestant-summary {
            background: #ffffffea;
            margin: 0 1.2rem 1rem 1.2rem;
            padding: 8px 16px;
            border-radius: 48px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }

        .final-score-box {
            background: #0f172a;
            padding: 4px 16px;
            border-radius: 40px;
            color: #facc15;
            font-weight: 800;
            font-size: 1.2rem;
        }
        .weight-detail {
            font-size: 0.7rem;
            color: #2c3e66;
        }
        .detail-stats {
            font-size: 0.7rem;
            color: #334155;
        }

        .global-actions {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            background: #1e293b;
            padding: 12px 18px;
            border-radius: 60px;
        }

        .global-btn {
            background: #fbbf24;
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            color: #0f172a;
        }

        .global-btn.secondary {
            background: #334155;
            color: white;
        }

        .global-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }

        footer {
            text-align: center;
            margin-top: 24px;
            padding: 12px;
            color: #64748b;
            font-size: 0.68rem;
        }

        @media (max-width: 700px) {
            .contestant-header {
                flex-direction: column;
                align-items: stretch;
            }
            .judges-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>📊 加权评分系统 · 评委60% + 收集表40%</h1>
        <div class="subtitle">✨ 评委评分占比60% | 收集表平均分占比40% | 自动排序 | 动态增删选手/评委 ✨</div>
    </div>

    <div id="contestantsArea" class="contestants-grid">
        <!-- 动态生成选手卡片 -->
    </div>

    <div class="global-actions">
        <button id="addContestantBtn" class="global-btn">➕ 添加新选手</button>
        <button id="globalRecalcBtn" class="global-btn">🔄 重新计算所有选手得分</button>
        <button id="resetDemoBtn" class="global-btn secondary">📋 重置演示数据</button>
    </div>
    <footer>
        💡 加权规则：<strong>最终总分 = 评委平均分 × 60% + 收集表平均分 × 40%</strong><br>
        ✅ 已移除“去掉最高/最低分”逻辑，评委分为所有有效评分的简单平均值。每个选手独立设置“收集表平均分”数据口，支持0-100分。
    </footer>
</div>

<script>
    // ---------- 数据结构 ----------
    // 每个选手: { id, name, judges: [{ judgeName, score }], collectAvgScore: 数值(0-100) }
    let contestants = [];
    let nextContestantId = 1;

    // 演示默认数据：三位选手，每位选手有不同数量评委，预设收集表平均分
    const DEFAULT_DATA = {
        contestants: [
            { 
                name: "选手 01 · 林悦", 
                collectAvg: 86.5,
                judges: [
                    { judgeName: "声乐专家", score: "92.5" },
                    { judgeName: "舞蹈导师", score: "88.0" },
                    { judgeName: "艺术总监", score: "94.0" },
                    { judgeName: "媒体评审", score: "89.5" }
                ]
            },
            { 
                name: "选手 02 · 陈曦", 
                collectAvg: 91.0,
                judges: [
                    { judgeName: "声乐专家", score: "95.0" },
                    { judgeName: "舞蹈导师", score: "91.5" },
                    { judgeName: "艺术总监", score: "87.0" },
                    { judgeName: "媒体评审", score: "93.0" },
                    { judgeName: "特邀嘉宾", score: "94.5" }
                ]
            },
            { 
                name: "选手 03 · 周若彤", 
                collectAvg: 78.5,
                judges: [
                    { judgeName: "声乐专家", score: "88.5" },
                    { judgeName: "舞蹈导师", score: "92.0" },
                    { judgeName: "艺术总监", score: "90.0" },
                    { judgeName: "媒体评审", score: "86.5" }
                ]
            }
        ]
    };

    // 校验分数 0-100
    function isValidScore(scoreStr) {
        if (scoreStr === null || scoreStr === undefined || scoreStr === "") return false;
        const num = parseFloat(scoreStr);
        if (isNaN(num)) return false;
        return num >= 0 && num <= 100;
    }

    function parseScoreSafe(scoreStr) {
        if (!isValidScore(scoreStr)) return null;
        return parseFloat(scoreStr);
    }

    // 计算评委平均分（简单平均，不去除任何最高最低）
    function computeJudgeAverage(judgesArray) {
        let validScores = [];
        for (let j of judgesArray) {
            const num = parseScoreSafe(j.score);
            if (num !== null) {
                validScores.push(num);
            }
        }
        if (validScores.length === 0) return null;
        const sum = validScores.reduce((acc, v) => acc + v, 0);
        return sum / validScores.length;
    }

    // 获取收集表平均分 (确保数值在0-100)
    function getCollectAvgValue(contestant) {
        let val = contestant.collectAvgScore;
        if (val === undefined || val === null || isNaN(val)) return null;
        let num = parseFloat(val);
        if (isNaN(num)) return null;
        if (num < 0) num = 0;
        if (num > 100) num = 100;
        return num;
    }

    // 最终总分 = 评委平均分 * 0.6 + 收集表平均分 * 0.4
    function computeWeightedFinalScore(contestant) {
        const judgeAvg = computeJudgeAverage(contestant.judges);
        const collectAvg = getCollectAvgValue(contestant);
        if (judgeAvg === null && collectAvg === null) return null;
        // 如果某一边缺失，规则上按照仅有一边计算（保证弹性）
        if (judgeAvg === null) {
            // 无评委评分时只依靠收集表分数
            return collectAvg !== null ? collectAvg : null;
        }
        if (collectAvg === null) {
            return judgeAvg;
        }
        // 正常加权: 60% 评委 + 40% 收集表
        return judgeAvg * 0.6 + collectAvg * 0.4;
    }

    // 获取用于排序的最终得分 (无效分数返回 -1 排最后)
    function getSortScore(contestant) {
        const final = computeWeightedFinalScore(contestant);
        return final !== null ? final : -1;
    }

    // 按最终总分降序排序 (高到低)
    function sortContestantsByWeightedScore(contestantsList) {
        return [...contestantsList].sort((a, b) => {
            const scoreA = getSortScore(a);
            const scoreB = getSortScore(b);
            if (scoreA === scoreB) return a.id - b.id;
            return scoreB - scoreA;
        });
    }

    // 辅助: 获取评委评分统计信息（展示用）
    function getJudgeStats(judgesArray) {
        let validScores = [];
        for (let j of judgesArray) {
            const num = parseScoreSafe(j.score);
            if (num !== null) validScores.push(num);
        }
        const count = validScores.length;
        const avg = count > 0 ? validScores.reduce((a,b) => a+b,0)/count : null;
        const maxVal = count > 0 ? Math.max(...validScores) : null;
        const minVal = count > 0 ? Math.min(...validScores) : null;
        return { count, avg, maxVal, minVal };
    }

    // 渲染整个界面 (先排序再渲染)
    function renderAll() {
        const container = document.getElementById('contestantsArea');
        if (!container) return;
        container.innerHTML = '';

        const sortedContestants = sortContestantsByWeightedScore(contestants);

        for (let idx = 0; idx < sortedContestants.length; idx++) {
            const c = sortedContestants[idx];
            const judgeStats = getJudgeStats(c.judges);
            const judgeAvgRaw = judgeStats.avg;
            const collectRaw = getCollectAvgValue(c);
            const finalScore = computeWeightedFinalScore(c);
            const finalScoreText = (finalScore !== null) ? finalScore.toFixed(2) : "数据缺失";
            
            // 排名标记
            const rank = idx + 1;
            const medal = rank === 1 ? '🥇' : (rank === 2 ? '🥈' : (rank === 3 ? '🥉' : `${rank}.`));
            
            // 卡片
            const card = document.createElement('div');
            card.className = 'contestant-card';
            card.dataset.id = c.id;

            // 头部
            const headerDiv = document.createElement('div');
            headerDiv.className = 'contestant-header';
            headerDiv.innerHTML = `
                <div class="contestant-name-wrapper">
                    <div class="contestant-name" contenteditable="true" data-field="name" data-id="${c.id}">${escapeHtml(c.name)}</div>
                    <div class="contestant-badge">🎤 ID: ${c.id} &nbsp; ${medal}</div>
                </div>
                <div class="contestant-actions">
                    <button class="btn-icon add-judge-to-contestant" data-id="${c.id}">➕ 添加评委</button>
                    <button class="btn-icon danger remove-contestant" data-id="${c.id}">🗑️ 删除选手</button>
                </div>
            `;
            
            // 评委区域
            const judgesSection = document.createElement('div');
            judgesSection.className = 'judges-section';
            
            const toolbar = document.createElement('div');
            toolbar.className = 'section-toolbar';
            toolbar.innerHTML = `
                <div class="judges-title">👩‍⚖️ 评委评分 (满分100分) · 占比60%</div>
                <div class="button-group">
                    <button class="small-btn add-judge-to-contestant" data-id="${c.id}">+ 评委</button>
                </div>
            `;
            
            const judgesGrid = document.createElement('div');
            judgesGrid.className = 'judges-grid';
            
            // 循环评委
            c.judges.forEach((judge, jIdx) => {
                const isValid = isValidScore(judge.score);
                const judgeCard = document.createElement('div');
                judgeCard.className = 'judge-card';
                judgeCard.innerHTML = `
                    <div class="judge-card-header">
                        <span class="judge-name" contenteditable="true" data-judgeidx="${jIdx}" data-contid="${c.id}" data-field="judgeName">${escapeHtml(judge.judgeName)}</span>
                        <button class="remove-judge" data-contid="${c.id}" data-judgeidx="${jIdx}">✖</button>
                    </div>
                    <div class="score-input-wrapper">
                        <label>分数:</label>
                        <input type="text" class="score-input ${!isValid && judge.score ? 'invalid' : ''}" value="${escapeHtml(judge.score)}" placeholder="0~100" data-contid="${c.id}" data-judgeidx="${jIdx}" data-field="score">
                    </div>
                    <div class="score-preview">${isValid ? `✓ ${parseFloat(judge.score).toFixed(2)}` : (judge.score ? '❌无效' : '请输入')}</div>
                `;
                judgesGrid.appendChild(judgeCard);
            });
            
            judgesSection.appendChild(toolbar);
            judgesSection.appendChild(judgesGrid);
            
            // ----- 新增数据收集表区域 (可编辑收集表平均分，占比40%) -----
            const collectSection = document.createElement('div');
            collectSection.className = 'data-collect-section';
            // 保证收集表分数的显示
            const displayCollect = (collectRaw !== null) ? collectRaw.toFixed(2) : '';
            collectSection.innerHTML = `
                <div class="collect-label">
                    📋 收集表数据 <span style="font-weight:800;">(占比40%)</span>
                </div>
                <div class="collect-input-group">
                    <span>平均分：</span>
                    <input type="number" step="0.1" min="0" max="100" class="collect-input" data-collect-input="${c.id}" value="${collectRaw !== null ? collectRaw : ''}" placeholder="0~100">
                    <span class="weight-hint">权重 40% → 最终加权分</span>
                </div>
            `;
            
            // 成绩汇总栏：显示评委平均分、收集表平均分和最终加权分
            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'contestant-summary';
            const judgeAvgDisplay = (judgeStats.avg !== null) ? judgeStats.avg.toFixed(2) : '无有效评分';
            const collectDisplayText = (collectRaw !== null) ? collectRaw.toFixed(2) : '未设置';
            const weightInfo = `评委均分: ${judgeAvgDisplay} (60%) | 收集表: ${collectDisplayText} (40%)`;
            summaryDiv.innerHTML = `
                <div class="detail-stats">📊 ${weightInfo} | 有效评委: ${judgeStats.count}人</div>
                <div class="final-score-box">
                    🏆 最终总分: <span class="contestant-final-score" data-id="${c.id}">${finalScoreText}</span>
                </div>
                <button class="small-btn primary recalc-single" data-id="${c.id}">🔄 刷新</button>
            `;
            
            card.appendChild(headerDiv);
            card.appendChild(judgesSection);
            card.appendChild(collectSection);
            card.appendChild(summaryDiv);
            container.appendChild(card);
        }
        
        attachGlobalEvents();
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    // 全局事件委托
    function attachGlobalEvents() {
        const container = document.getElementById('contestantsArea');
        if (!container) return;
        container.removeEventListener('input', handleInputChange);
        container.removeEventListener('blur', handleBlurEdit, true);
        container.removeEventListener('click', handleClickActions);
        container.removeEventListener('change', handleCollectChange);
        container.addEventListener('input', handleInputChange);
        container.addEventListener('blur', handleBlurEdit, true);
        container.addEventListener('click', handleClickActions);
        container.addEventListener('change', handleCollectChange);
    }
    
    function handleInputChange(e) {
        const target = e.target;
        if (target.classList && target.classList.contains('score-input')) {
            const contId = parseInt(target.dataset.contid);
            const judgeIdx = parseInt(target.dataset.judgeidx);
            const newVal = target.value;
            const contestant = contestants.find(c => c.id === contId);
            if (contestant && contestant.judges[judgeIdx]) {
                contestant.judges[judgeIdx].score = newVal;
                renderAll();
            }
        }
    }
    
    // 处理收集表平均分输入 (change事件保证数值更新)
    function handleCollectChange(e) {
        const target = e.target;
        if (target.hasAttribute && target.hasAttribute('data-collect-input')) {
            const contId = parseInt(target.getAttribute('data-collect-input'));
            let rawValue = target.value;
            const contestant = contestants.find(c => c.id === contId);
            if (contestant) {
                let num = parseFloat(rawValue);
                if (isNaN(num)) {
                    contestant.collectAvgScore = null;
                } else {
                    if (num < 0) num = 0;
                    if (num > 100) num = 100;
                    contestant.collectAvgScore = num;
                }
                renderAll();
            }
        }
    }
    
    function handleBlurEdit(e) {
        const target = e.target;
        // 选手姓名编辑
        if (target.classList && target.classList.contains('contestant-name') && target.isContentEditable) {
            const contId = parseInt(target.dataset.id);
            const newName = target.innerText.trim();
            if (contId && newName) {
                const contestant = contestants.find(c => c.id === contId);
                if (contestant) contestant.name = newName;
                renderAll();
            }
        }
        // 评委姓名编辑
        if (target.classList && target.classList.contains('judge-name') && target.isContentEditable) {
            const contId = parseInt(target.dataset.contid);
            const judgeIdx = parseInt(target.dataset.judgeidx);
            const newJudgeName = target.innerText.trim();
            if (contId && !isNaN(judgeIdx)) {
                const contestant = contestants.find(c => c.id === contId);
                if (contestant && contestant.judges[judgeIdx]) {
                    contestant.judges[judgeIdx].judgeName = newJudgeName || `评委${judgeIdx+1}`;
                    renderAll();
                }
            }
        }
    }
    
    function handleClickActions(e) {
        const target = e.target;
        // 添加评委
        if (target.classList.contains('add-judge-to-contestant')) {
            const contId = parseInt(target.dataset.id);
            const contestant = contestants.find(c => c.id === contId);
            if (contestant) {
                const newJudgeName = `评委${contestant.judges.length+1}`;
                contestant.judges.push({
                    judgeName: newJudgeName,
                    score: "80.0"
                });
                renderAll();
            }
            e.preventDefault();
        }
        // 删除评委
        if (target.classList.contains('remove-judge')) {
            const contId = parseInt(target.dataset.contid);
            const judgeIdx = parseInt(target.dataset.judgeidx);
            const contestant = contestants.find(c => c.id === contId);
            if (contestant && contestant.judges.length > 1) {
                contestant.judges.splice(judgeIdx, 1);
                renderAll();
            } else if (contestant && contestant.judges.length <= 1) {
                alert("每个选手至少需要保留1位评委！");
            }
            e.preventDefault();
        }
        // 删除选手
        if (target.classList.contains('remove-contestant')) {
            const contId = parseInt(target.dataset.id);
            if (contestants.length <= 1) {
                alert("至少保留一名选手");
                return;
            }
            contestants = contestants.filter(c => c.id !== contId);
            renderAll();
            e.preventDefault();
        }
        // 刷新单个 / 全局重算统一用renderAll
        if (target.classList.contains('recalc-single')) {
            renderAll();
            e.preventDefault();
        }
    }
    
    function recalcAll() {
        renderAll();
    }
    
    function addContestant() {
        const newId = nextContestantId++;
        const defaultJudges = [
            { judgeName: "评委甲", score: "78.0" },
            { judgeName: "评委乙", score: "82.0" }
        ];
        contestants.push({
            id: newId,
            name: `新选手 ${newId}`,
            judges: defaultJudges,
            collectAvgScore: 75.0   // 默认给75分收集表数据
        });
        renderAll();
    }
    
    function resetDemoData() {
        contestants = [];
        nextContestantId = 1;
        for (let demo of DEFAULT_DATA.contestants) {
            const judgesArr = demo.judges.map(j => ({ judgeName: j.judgeName, score: j.score.toString() }));
            contestants.push({
                id: nextContestantId++,
                name: demo.name,
                judges: judgesArr,
                collectAvgScore: demo.collectAvg
            });
        }
        renderAll();
    }
    
    function bindGlobalButtons() {
        const addBtn = document.getElementById('addContestantBtn');
        const globalRecalc = document.getElementById('globalRecalcBtn');
        const resetBtn = document.getElementById('resetDemoBtn');
        if (addBtn) addBtn.addEventListener('click', addContestant);
        if (globalRecalc) globalRecalc.addEventListener('click', recalcAll);
        if (resetBtn) resetBtn.addEventListener('click', resetDemoData);
    }
    
    function init() {
        resetDemoData();  // 载入演示数据
        bindGlobalButtons();
    }
    
    init();
</script>
</body>
</html>
